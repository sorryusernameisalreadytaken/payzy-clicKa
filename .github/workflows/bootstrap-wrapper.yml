name: Bootstrap Gradle Wrapper

# This workflow ensures that the Gradle wrapper scripts are present in the
# repository. It is triggered on the first push and can be reused to
# regenerate the wrapper if needed. This workflow runs once and exits
# gracefully if the wrapper already exists.

on:
  push:
    branches:
      - '**'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            echo "Gradle wrapper missing; generating it"
            gradle wrapper --gradle-version 8.5
          else
            echo "Gradle wrapper already present"
          fi